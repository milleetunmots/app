  inscription_success:
    with_widget: Votre inscription est bien prise en compte, nous vous recontacterons prochainement pour vous permettre de découvrir nos idées d'éveil par SMS.<br>D'ici là, pour nous aider à accompagner plus d'enfants, vous pouvez nous soutenir en faisant un don.
    neither_widget_nor_child_under_four_months_with_youngest_child_under_twenty_four_months: "D'ici quelques semaines, vous allez recevoir des livres et des SMS avec des idées pour éveiller le langage de votre enfant.<br><br>L’accompagnement durera <strong>1 an</strong> à partir de la réception du premier SMS.<br><br>Si vous avez encore 5 minutes, merci de répondre à <a href='%{typeform_url}' target='_blank'>ce court questionnaire</a> pour recevoir les livres chez vous."
    neither_widget_nor_child_under_four_months_without_youngest_child_under_twenty_four_months: "D'ici quelques semaines, vous allez recevoir des livres et des SMS avec des idées pour éveiller le langage de votre enfant.<br><br>L’accompagnement s'arrêtera quand votre enfant aura 3 ans.<br><br>Si vous avez encore 5 minutes, merci de répondre à <a href='%{typeform_url}' target='_blank'>ce court questionnaire</a> pour recevoir les livres chez vous."
    without_widget_but_with_children_under_four_months: "Vous avez inscrit votre enfant de moins de 4 mois, c’est super ! 🌟<br><br>Notre accompagnement commence à partir de 4 mois, vous recevrez donc nos livres et conseils pour lui dans environ 2 mois.<br>Pas d’inquiétude, c’est normal si vous avez moins de nouvelles de nous d’ici-là. 😌<br><br>L’accompagnement durera <strong>1 an<strong> à partir de la réception du premier SMS.<br><br>Si vous avez encore 5 minutes, merci de répondre à <a href='%{typeform_url}' target='_blank'>ce court questionnaire</a> pour recevoir les livres chez vous."
    pro: "L'inscription a bien été prise en compte. D'ici quelques semaines, les parents vont recevoir des livres et des SMS avec des idées pour éveiller le langage de leur enfant. Ils peuvent arrêter à tout moment."
    #pro_pmi: "Pour rappel : 1001mots ne lance pas de nouveaux accompagnements pendant l'été.<br>L'accompagnement de cette famille commencera donc à la rentrée. N'hésitez pas à le rappeler au(x) parent(s).<br>Pour toute question : pmi@1001mots.org<br>Bel été ☀️"
    #pro_local_partners: "Pour rappel : 1001mots ne lance pas de nouveaux accompagnements pendant l'été.<br>L'accompagnement de cette famille commencera donc à la rentrée. N'hésitez pas à le rappeler au(x) parent(s).<br>Bel été ☀️"
    with_parent_no_target: "Votre demande d'inscription a bien été enregistrée et va être traitée par notre équipe.<br>Nous reviendrons vers vous par SMS dans les prochains jours, en fonction des places disponibles."
